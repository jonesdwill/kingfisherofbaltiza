name: Notify subscribers of new blog post

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to detect additions vs edits

      - name: Detect new blog post
        id: detect
        run: |
          # Check if previous commit exists (handles edge case of first push)
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            NEW=$(git diff --name-status HEAD~1 HEAD -- src/content/blog/ \
              | grep '^A' | awk '{print $2}' | head -1)
          else
            NEW=$(git show --name-status HEAD -- src/content/blog/ \
              | grep '^A' | awk '{print $2}' | head -1)
          fi
          echo "file=$NEW" >> $GITHUB_OUTPUT
          [ -n "$NEW" ] && echo "found=true" >> $GITHUB_OUTPUT \
                        || echo "found=false" >> $GITHUB_OUTPUT
          echo "Detected new file: '${NEW:-none}'"

      - name: Send Kit broadcast
        if: steps.detect.outputs.found == 'true'
        env:
          KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
          POST_FILE: ${{ steps.detect.outputs.file }}
        run: |
          sudo apt-get install -y -q pandoc
          # Parse frontmatter
          TITLE=$(awk '/^---/{if(f)exit;f=1;next} f && /^title:/{print;exit}' "$POST_FILE" \
            | sed "s/^title: *//;s/^['\"]//;s/['\"]$//")
          DESC=$(awk '/^---/{if(f)exit;f=1;next} f && /^description:/{print;exit}' "$POST_FILE" \
            | sed "s/^description: *//;s/^['\"]//;s/['\"]$//")
          HERO=$(awk '/^---/{if(f)exit;f=1;next} f && /^heroImage:/{print;exit}' "$POST_FILE" \
            | sed "s/^heroImage: *//;s/^['\"]//;s/['\"]$//")
          SLUG=$(basename "$POST_FILE" .md)
          URL="https://www.kingfisherofbaltiza.co.uk/blog/${SLUG}/"

          echo "=== New post detected ==="
          echo "Title:       $TITLE"
          echo "Description: $DESC"
          echo "Hero image:  $HERO"
          echo "URL:         $URL"
          echo "========================="

          # Build hero image tag (convert local path to absolute URL)
          if [ -n "$HERO" ]; then
            HERO_ABS="https://www.kingfisherofbaltiza.co.uk${HERO}"
            HERO_HTML="<img src=\"${HERO_ABS}\" alt=\"${TITLE}\" style=\"max-width:100%;height:auto;display:block;margin-bottom:16px;\">"
          else
            HERO_HTML=""
          fi

          # Extract body (everything after the closing --- of frontmatter) and convert to HTML
          BODY=$(awk '/^---/{if(++c==2){found=1;next}} found{print}' "$POST_FILE")
          BODY_HTML=$(echo "$BODY" | pandoc -f markdown -t html \
            | sed 's|src="/|src="https://www.kingfisherofbaltiza.co.uk/|g')

          # Wrap in site-styled email template
          CONTENT=$(cat <<EMAILEOF
<div style="background:#f8f4f2;padding:0;margin:0;font-family:Georgia,serif;">
<div style="max-width:620px;margin:0 auto;background:#ffffff;border:1px solid #c8b8b0;">
  <div style="background:#a03010;padding:18px 28px;">
    <a href="https://www.kingfisherofbaltiza.co.uk" style="color:#ffffff;text-decoration:none;font-size:1.2em;letter-spacing:0.04em;">KINGFISHER OF BALTIZA</a>
  </div>
  <div style="padding:28px 32px;color:#1a1a1a;font-size:15px;line-height:1.7;">
    $([ -n "$HERO" ] && echo "<img src=\"${HERO_ABS}\" alt=\"${TITLE}\" style=\"max-width:100%;height:auto;display:block;margin-bottom:20px;\">")
    <h1 style="font-family:Georgia,serif;color:#a03010;font-size:1.5em;margin:0 0 6px 0;">${TITLE}</h1>
    <p style="color:#555555;font-size:0.88em;margin:0 0 16px 0;font-style:italic;">${DESC}</p>
    <hr style="border:none;border-top:1px solid #c8b8b0;margin:0 0 20px 0;">
    ${BODY_HTML}
    <hr style="border:none;border-top:1px solid #c8b8b0;margin:24px 0 20px 0;">
    <p style="margin:0;"><a href="${URL}" style="color:#a03010;font-weight:bold;">View on website &rarr;</a></p>
  </div>
  <div style="background:#f8f4f2;padding:14px 32px;border-top:1px solid #c8b8b0;font-size:0.78em;color:#555555;text-align:center;">
    Kingfisher of Baltiza &mdash; <a href="https://www.kingfisherofbaltiza.co.uk" style="color:#a03010;">kingfisherofbaltiza.co.uk</a>
  </div>
</div>
</div>
EMAILEOF
          )

          echo "Key length: ${#KIT_API_KEY}"
          echo "Testing auth with /account endpoint..."
          AUTH_STATUS=$(curl -s -o /tmp/auth_test.json -w "%{http_code}" \
            "https://api.kit.com/v4/account" \
            -H "X-Kit-Api-Key: ${KIT_API_KEY}")
          echo "Auth test status: $AUTH_STATUS"
          cat /tmp/auth_test.json | jq . 2>/dev/null || cat /tmp/auth_test.json

          echo "Calling Kit API..."
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          HTTP_STATUS=$(curl -s -o /tmp/kit_response.json -w "%{http_code}" \
            -X POST "https://api.kit.com/v4/broadcasts" \
            -H "X-Kit-Api-Key: ${KIT_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg subject "$TITLE" \
              --arg content "$CONTENT" \
              --arg preview_text "$DESC" \
              --arg description "$TITLE" \
              --arg published_at "$NOW" \
              --arg send_at "$NOW" \
              '{subject: $subject, content: $content, preview_text: $preview_text, description: $description, public: false, published_at: $published_at, send_at: $send_at}')")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/kit_response.json | jq . 2>/dev/null || cat /tmp/kit_response.json

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✓ Broadcast created/sent"
          else
            echo "✗ Kit API failed with HTTP $HTTP_STATUS"
            exit 1
          fi
