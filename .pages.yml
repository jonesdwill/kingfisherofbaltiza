media:
  input: public/gallery
  output: /gallery

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: '{title}.md'
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: string
      - name: pubDate
        label: Date
        type: date
        options:
          format: 'yyyy-MM-dd'
      - name: heroImage
        label: Cover Photo
        type: image
      - name: body
        label: Content
        type: rich-text

  - name: greenland-2026
    label: Greenland 2026 Page
    type: file
    path: src/content/pages/greenland-2026.md
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string
      - name: body
        label: Content
        type: rich-text
